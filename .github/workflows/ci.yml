name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code-channel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type-check and bundle
        run: npm run build

      - name: Verify committed dist/ is in sync with src/
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of sync with src/. Run 'npm run build' in claude-code-channel/ and commit the result."
            git status --porcelain dist/
            git --no-pager diff dist/ | head -200
            exit 1
          fi

      - name: Verify plugin.json and package.json versions match
        run: |
          pkg=$(node -p "require('./package.json').version")
          plg=$(node -p "require('./.claude-plugin/plugin.json').version")
          echo "package.json version: $pkg"
          echo "plugin.json  version: $plg"
          if [ "$pkg" != "$plg" ]; then
            echo "::error::Version drift: package.json=$pkg, plugin.json=$plg. Bump both."
            exit 1
          fi
